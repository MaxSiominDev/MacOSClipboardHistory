name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 360

    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
              -project ClipboardHistory.xcodeproj \
              -scheme ClipboardHistory \
              -destination 'platform=macOS' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGN_STYLE=Automatic

      - name: Import Developer ID certificate
        if: env.IS_RELEASE == 'true'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          CERT_PWD: ${{ secrets.MACOS_CERT_PWD }}
          KEYCHAIN_PWD: build-keychain-pwd
        run: |
          echo "$CERT_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain >/dev/null
          rm /tmp/cert.p12
          security find-identity -v -p codesigning build.keychain

      - name: Build & sign
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p release
          if [ "$IS_RELEASE" = "true" ]; then
            xcodebuild \
              -project ClipboardHistory.xcodeproj \
              -scheme ClipboardHistory \
              -configuration Release \
              -destination 'generic/platform=macOS' \
              -archivePath release/ClipboardHistory.xcarchive \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Developer ID Application" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              archive
          else
            xcodebuild \
              -project ClipboardHistory.xcodeproj \
              -scheme ClipboardHistory \
              -configuration Release \
              -destination 'generic/platform=macOS' \
              -archivePath release/ClipboardHistory.xcarchive \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGN_STYLE=Automatic \
              archive
          fi

      - name: Package zip
        run: |
          APP="release/ClipboardHistory.xcarchive/Products/Applications/ClipboardHistory.app"
          ditto -c -k --keepParent --sequesterRsrc "$APP" release/ClipboardHistory.zip
          ls -lh release/

      - name: Notarize & staple
        if: env.IS_RELEASE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit release/ClipboardHistory.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          xcrun stapler staple release/ClipboardHistory.xcarchive/Products/Applications/ClipboardHistory.app
          # Re-zip with stapled ticket
          rm release/ClipboardHistory.zip
          ditto -c -k --keepParent --sequesterRsrc \
              release/ClipboardHistory.xcarchive/Products/Applications/ClipboardHistory.app \
              release/ClipboardHistory.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardHistory-${{ github.sha }}
          path: release/ClipboardHistory.zip
          if-no-files-found: error

      - name: Compute SHA256
        if: env.IS_RELEASE == 'true'
        id: sha
        run: |
          SHA=$(shasum -a 256 release/ClipboardHistory.zip | awk '{print $1}')
          echo "value=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/ClipboardHistory.zip
          generate_release_notes: true
          body: |
            ## Install

            ### Homebrew
            ```sh
            brew tap maxsiomin/cliph
            brew install --cask cliph
            ```
            ---
            SHA256: `${{ steps.sha.outputs.value }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
